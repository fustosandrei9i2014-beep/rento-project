<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>#Rento – Housing Support</title>

<style>
body {font-family: Arial; margin:0; background:#f5f7fb;}
header {background:#4a3aff; color:white; padding:30px; text-align:center;}
.container {padding:40px; text-align:center;}

.card {
    background:white;
    padding:20px;
    margin:20px auto;
    width:280px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button {
    padding:10px 20px;
    border:none;
    background:#4a3aff;
    color:white;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>#Rento</h1>
<p>Housing support when you need it most</p>
</header>

<div class="container">

<div class="card">
<h3>Submit Your Issue</h3>
<p>Tell us about your housing situation</p>
<button onclick="submitIssue()">Submit</button>
</div>

<div class="card">
<h3>Find Assistance</h3>
<p>Explore rental help</p>
<button onclick="findHelp()">Explore</button>
</div>

<div class="card">
<h3>Contact Support</h3>
<p>Connect with NGOs</p>
<button onclick="contact()">Contact</button>
</div>

</div>

<script>
function submitIssue() {
    alert("Your issue has been submitted successfully!");
}

function findHelp() {
    alert("Redirecting to rental assistance resources...");
}

function contact() {
    alert("Connecting you with local support...");
}
</script>

</body>
</html>
